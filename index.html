<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: #000;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            z-index: 100;
        }

        nav svg {
            fill: #f5f5f7;
            width: 18px;
            height: 22px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 980px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #a1a1a6;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.05;
            background: linear-gradient(135deg, #fff 30%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        p {
            font-size: clamp(17px, 2.5vw, 21px);
            font-weight: 400;
            color: #a1a1a6;
            line-height: 1.6;
            margin-bottom: 48px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-wrap {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 980px;
            height: 4px;
            width: 260px;
            margin: 0 auto 48px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 55%;
            background: linear-gradient(90deg, #0071e3, #34aadc);
            border-radius: 980px;
            animation: pulse 2.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #0071e3;
            color: #fff;
            font-size: 17px;
            font-weight: 400;
            text-decoration: none;
            border-radius: 980px;
            padding: 12px 28px;
            transition: background 0.2s ease;
            cursor: default;
        }

        .cta:hover {
            background: #0077ed;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            font-size: 12px;
            color: #6e6e73;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

    <nav>
        <!-- Apple logo SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" aria-label="Apple">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.3 269-317.3 70.1 0 128.4 46.4 172.5 46.4 42.8 0 109.6-49.1 191.4-49.1zm-3.7-187.8c33.6-40.8 57.8-97.9 57.8-155.1 0-8-1.3-16-1.9-23.4-54.5 2.1-119 36.4-157.8 82.2-31.6 37.1-61.6 94.2-61.6 152.1 0 8.6 1.3 17.3 1.9 20 3.2.6 8.6 1.3 13.5 1.3 48.5 0 109.6-32.9 148.1-77.1z"/>
        </svg>
    </nav>

    <div class="container">
        <div class="badge">Em breve</div>
        <h1>Página em Construção</h1>
        <p>Estamos a trabalhar para trazer algo incrível. Voltaremos em breve com uma experiência totalmente nova.</p>
        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>
        <span class="cta">Notificar-me quando estiver pronto</span>
    </div>

    <footer>
        Copyright &copy; 2026. Todos os direitos reservados.
    </footer>

</body>
</html>
